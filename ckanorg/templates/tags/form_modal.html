{% load static wagtailcore_tags %}
{% load wagtailsettings_tags %}

<script src="{% static 'js/jquery-3.5.1.min.js' %}"></script>

{% if form %}
    <div class="row">
        <div class="col-xs-1 text-capitalize" align="center">
            <a class="modal-link" data-micromodal-trigger="modal-{{ form_id }}" href="#" onclick="javascript:void(0);" id="modal-link-{{ form_id }}">
                {{ form_page.button_text }}
            </a>
        </div>
    </div>

    <div class="modal micromodal-slide" id="modal-{{ form_id }}">
        <div class="modal__overlay" tabindex="-1" data-micromodal-close>
            <div class="modal__container" id="modal-container-{{ form_id }}" role="dialog" aria-modal="true" aria-labelledby="modal-title-{{ form_id }}">
                <header class="modal__header">
                    <h2 class="modal__title" id="modal-title-{{ form_id }}">
                        {{ form_page.title }}
                    </h2>
                    <button class="modal__close" aria-label="Close modal" data-micromodal-close></button>
                </header>
                <form action="{% pageurl form_page %}" method="POST" role="form" class="contact-modal" id="modal-form-{{ form_id }}">
                    <main class="modal__content" id="modal-content-{{ form_id }}">
                        {% csrf_token %}
                        <div class="modal-intro">
                            {{ form_page.intro|richtext }}
                        </div>
                        {{ form.as_p }}
                        {% if page.pk != form_page.pk %}
                            <input name="source-page-id" type="hidden" value="{{ page.pk }}">
                        {% endif %}
                    </main>
                    <footer class="modal__footer">
                        <div id="recaptcha-container-{{ form_id }}"></div>
                        <input id="message-text" type="hidden" value="{{form_page.thank_you_text|safe}}">
                        <input type="submit" hidden>
                        <button class="captcha-submit modal__btn" id="modal-button-{{ form_id }}" data-form-id="modal-form-{{ form_id }}">
                            {{ _("Submit") }}
                        </button>
                    </footer>
                </form>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        $("#modal-link-{{ form_id }}").on("click", function() {
            var modal_form = $("#modal-form-{{ form_id }}");
            var button = $("#modal-button-{{ form_id }}");
            var required = modal_form.find("input[required], select[required], textarea[required]");

            // check whether all required fields are fulfilled
            required.on("blur keyup change", function() {
                var all_required_filled = true;

                required.each(function() {
                    if (!$(this).val()) {
                        all_required_filled = false;
                    };
                });

                if (all_required_filled) {
                    button.prop("disabled", false).addClass("modal__btn-primary");
                } else {
                    button.prop("disabled", true).removeClass("modal__btn-primary");
                };
            });
        });
    </script>
{% endif %}
